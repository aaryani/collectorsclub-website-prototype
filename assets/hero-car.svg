<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2218"/>
      <stop offset="45%" stop-color="#16130d"/>
      <stop offset="100%" stop-color="#0b0a08"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c87a"/>
      <stop offset="100%" stop-color="#7c601f"/>
    </linearGradient>
    <radialGradient id="head" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6e0"/>
      <stop offset="100%" stop-color="#c9a24b"/>
    </radialGradient>
  </defs>
  <!-- ground reflection -->
  <ellipse cx="260" cy="262" rx="230" ry="16" fill="#c9a24b" opacity=".10"/>
  <!-- body -->
  <path d="M30 214
           C 36 196 60 188 96 182
           L 150 132
           C 168 116 196 108 226 108
           L 318 108
           C 356 108 392 122 420 148
           L 452 178
           C 480 184 500 196 500 214
           L 500 232
           C 500 240 494 246 486 246
           L 44 246
           C 36 246 30 240 30 232 Z"
        fill="url(#body)" stroke="url(#chrome)" stroke-width="2.5"/>
  <!-- cabin / windows -->
  <path d="M168 130 C 182 116 204 110 228 110 L 300 110 C 330 110 356 120 376 138 L 392 154 L 176 154 Z"
        fill="#1c1812" stroke="#433a26" stroke-width="1.5"/>
  <path d="M186 150 L 198 130 C 208 122 222 118 236 118 L 282 118 L 288 150 Z" fill="#2a2418" opacity=".7"/>
  <!-- side line -->
  <path d="M70 200 L 446 200" stroke="url(#chrome)" stroke-width="1.5" opacity=".5"/>
  <!-- door handle -->
  <rect x="300" y="186" width="22" height="5" rx="2.5" fill="url(#chrome)"/>
  <!-- headlight -->
  <ellipse cx="470" cy="200" rx="12" ry="10" fill="url(#head)"/>
  <!-- grille -->
  <path d="M452 210 q26 4 36 14" fill="none" stroke="url(#chrome)" stroke-width="2"/>
  <!-- wheels -->
  <g>
    <circle cx="146" cy="242" r="40" fill="#0c0c0e" stroke="url(#chrome)" stroke-width="3"/>
    <circle cx="146" cy="242" r="17" fill="#16140f" stroke="#e8c87a" stroke-width="2"/>
    <g stroke="#c9a24b" stroke-width="2"><line x1="146" y1="225" x2="146" y2="259"/><line x1="129" y1="242" x2="163" y2="242"/><line x1="134" y1="230" x2="158" y2="254"/><line x1="158" y1="230" x2="134" y2="254"/></g>
  </g>
  <g>
    <circle cx="382" cy="242" r="40" fill="#0c0c0e" stroke="url(#chrome)" stroke-width="3"/>
    <circle cx="382" cy="242" r="17" fill="#16140f" stroke="#e8c87a" stroke-width="2"/>
    <g stroke="#c9a24b" stroke-width="2"><line x1="382" y1="225" x2="382" y2="259"/><line x1="365" y1="242" x2="399" y2="242"/><line x1="370" y1="230" x2="394" y2="254"/><line x1="394" y1="230" x2="370" y2="254"/></g>
  </g>
  <!-- body glare -->
  <path d="M100 178 C 160 156 320 156 410 188 C 320 172 170 174 100 192 Z" fill="#ffffff" opacity=".05"/>
</svg>
